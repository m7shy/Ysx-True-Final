# fly.toml app configuration file for ysx-true-final
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ysx-true-final'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Persist follow-up scheduler data (server/data) across restarts/deploys.
# Create the volume once with:
#   fly volumes create ysx_data --region ams --size 1
[[mounts]]
  source = 'ysx_data'
  destination = '/app/server/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
